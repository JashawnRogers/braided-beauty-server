spring.application.name=braided-beauty

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.id.new_generator_mappings=true

spring.security.oauth2.client.registration.google.client-id=${OAUTH_GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${OAUTH_GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.scope=openid,email,profile
spring.security.oauth2.client.registration.google.redirect-uri=${BASE_URL}/login/oauth2/code/google
spring.security.oauth2.client.registration.google.client-name=Google

app.s3.access-key=${AWS_S3_ACCESS_KEY:}
app.s3.secret-key=${AWS_S3_SECRET_KEY:}
app.s3.region=${AWS_S3_REGION:us-west-1}
app.s3.bucket-name=${AWS_S3_BUCKET_NAME:}
app.s3.url=${AWS_S3_URL:https://s3.us-west-1.amazonaws.com}

spring.mail.host=${SPRING_MAIL_HOST:smtp-relay.brevo.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

app.media.maxImageBytes=5242880
app.media.maxVideoBytes=20971520

app.frontend.base-url=${APP_FRONTEND_BASE_URL:}

app.bootstrap-admin.enabled=${APP_BOOTSTRAP_ADMIN_ENABLED:false}
app.bootstrap-admin.secret=${APP_BOOTSTRAP_ADMIN_SECRET:}

app.cookies.secure=${APP_COOKIES_SECURE:false}
app.cookies.same-site=${APP_COOKIES_SAME_SITE:Lax}

stripe.secret-key=${STRIPE_SECRET_KEY:}
stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET:}

jwt.private-key=${JWT_PRIVATE_KEY:classpath:keys/private.pem}
jwt.public-key=${JWT_PUBLIC_KEY:classpath:keys/public.pem}

server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=on_param

logging.level.root=INFO
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=INFO

spring.jpa.defer-datasource-initialization=false
spring.flyway.enabled=true
spring.output.ansi.enabled=ALWAYS
logging.pattern.console=%clr(%d{HH:mm:ss.SSS}){faint} %clr(%-5level) %clr([%thread]){faint} %clr(%logger{36}){cyan} - %msg%n