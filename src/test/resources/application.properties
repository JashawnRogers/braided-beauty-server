app.s3.access-key=dummy
app.s3.secret-key=dummy
app.s3.region=us-west-1
app.s3.bucket-name=dummy
app.s3.url=http://dummy.com
app.rate-limiting.enabled=false

jwt.private-key=classpath:keys/private.pem
jwt.public-key=classpath:keys/public.pem
jwt.private-key-pem=${JWT_PRIVATE_KEY_PEM:}
jwt.public-key-pem=${JWT_PUBLIC_KEY_PEM:}

spring.application.name=braided-beauty

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.id.new_generator_mappings=true

spring.security.oauth2.client.registration.google.client-id=dummy
spring.security.oauth2.client.registration.google.client-secret=dummy
spring.security.oauth2.client.registration.google.scope=openid,email,profile
spring.security.oauth2.client.registration.google.client-name=Google

spring.mail.host=${SPRING_MAIL_HOST:smtp-relay.brevo.com}
spring.mail.port=587
spring.mail.username=dummy
spring.mail.password=dummy
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

app.media.maxImageBytes=5242880
app.media.maxVideoBytes=20971520

app.bootstrap-admin.enabled=${APP_BOOTSTRAP_ADMIN_ENABLED:false}
app.bootstrap-admin.secret=${APP_BOOTSTRAP_ADMIN_SECRET:}

app.cookies.secure=${APP_COOKIES_SECURE:false}
app.cookies.same-site=${APP_COOKIES_SAME_SITE:Lax}

stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET:}

server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=on_param
server.forward-headers-strategy=framework

logging.level.root=INFO
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=INFO

spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.defer-datasource-initialization=false
spring.flyway.enabled=true
spring.output.ansi.enabled=ALWAYS
logging.pattern.console=%clr(%d{HH:mm:ss.SSS}){faint} %clr(%-5level) %clr([%thread]){faint} %clr(%logger{36}){cyan} - %msg%n
